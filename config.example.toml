# AirType user config
#:schema ./config.schema.json
# Local app settings live under [localapp.*].
# Web UI runtime settings live under [webui.*].

#===============================================================================
# Local App Settings
#===============================================================================

[localapp.chinese-mode]
# Options: "zh-tw", "zh-cn"
mode = "zh-tw"

[localapp.backend-endpoint]
# Options: "local", "remote"
mode = "local"
local_endpoint = "http://localhost:8003"
remote_endpoint = ""

[localapp.microphone]
# Microphone Device Name. Leave empty to use the system default microphone.
selected_device_name = "Jabra Speak2 55 MS"
# Microphone Mode. Options: "on_demand", "always"
mode = "on_demand"
pre_roll_seconds = 2

[localapp.floating-dialog]
# Position is stored as the dialog center ratio across the whole desktop.
position_x_ratio = 0.2598
position_y_ratio = 0.0597
move_lock = false

#===============================================================================
# Web UI Settings
#===============================================================================

[webui.storage]
data_dir = "~/.airtype/data"

[webui.auth]
# Require cookie-session authentication for the Web UI and API.
enabled = false
username = "airtype"
password = ""
session_days = 14

[webui.whisper-server]
model_dir = "~/.airtype/models"
model_filename = "ggml-large-v3-turbo-q5_0.bin"
server_bin = "/opt/homebrew/bin/whisper-server"
remote_endpoint = ""
server_args = ""
language = "zh-tw"
beam = 5
temperature = 0

[webui.yt-dlp]
# Optional. Use one of these when a media URL requires logged-in browser cookies.
cookies = ""
cookies_from_browser = ""

[[webui.llm-server]]
# Unique name for this LLM server.
name = "llama.cpp"
provider = "openai"
endpoint = "http://LLM_SERVER:8088/"
api_key = ""
models = ["gemma-4-e2b", "qwen3-coder-30b", "qwen3-coder-30b-1m", "qwen3-coder-next", "qwen3-vl-30b-a3b-thinking", "qwen3.6-27b", "qwen3.6-35b-a3b", "unsloth/Qwen3-VL-30B-A3B-Thinking-GGUF:Q4_K_XL", "unsloth/Qwen3.6-27B-MTP-GGUF:Q4_K_XL", "unsloth/Qwen3.6-35B-A3B-MTP-GGUF:Q4_K_XL", "unsloth/gemma-4-E2B-it-GGUF:Q4_K_XL"]
selected-model = "gemma-4-e2b"
contextLength = 8192
temperature = 0.4
system = "No explanations or detailed listings are needed; simply organize the verbatim transcript, including correcting typos, polishing sentences, and stringing the transcript together into an article."

[webui]
default-llm-server-name = "llama.cpp"
