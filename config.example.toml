# AirType user config
#:schema ./config.schema.json
# Local app settings live under [localapp.*] below.
# Web UI runtime settings live under [webui.*] below.

#===============================================================================
# Local App Settings
#===============================================================================

[localapp.chinese-mode]
# Options: "zh-tw", "zh-cn"
mode = "zh-tw"

[localapp.backend-endpoint]
# Options: "local", "remote"
mode = "local"
local_endpoint = "http://localhost:8003"
remote_endpoint = ""

[localapp.microphone]
# Microphone Device. Leave empty to use the system default microphone.
selected_order = "7"
# Microphone Mode. Options: "on_demand", "always"
mode = "on_demand"
pre_roll_seconds = 2

[localapp.floating-dialog]
# Position is stored as the dialog center ratio across the whole desktop.
position_x_ratio = 0.2598
position_y_ratio = 0.0597
move_lock = false

[localapp.hotkey]
# Options: "right_ctrl", "right_option"
trigger = "right_ctrl"


#===============================================================================
# Web UI Settings
#===============================================================================

[webui.storage]
# Runtime data directory. Records are stored under data_dir/records/{ime,transcript}.
data_dir = "~/.airtype/data"

[webui.whisper-server]
model_dir = "~/.airtype/models"
model_filename = "ggml-large-v3-turbo-q5_0.bin"
server_bin = "/opt/homebrew/bin/whisper-server"
endpoint = ""
language = "zh-tw"
beam = 5
temperature = 0

[webui.llm-server]
provider = "llama.cpp"
endpoint = "http://114.34.75.131:8088/"
model = "unsloth/gemma-4-E2B-it-GGUF:Q4_K_XL"
contextLength = 8192
temperature = 0.4
system = ""
